<!doctype html>
<html lang="ar" dir="rtl">
<head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>Course</title><link rel="stylesheet" href="styles.css"></head>
<body>
  <header class="header">
    <div class="brand"><div class="logo">ED</div><div><div style="font-weight:800">منصة تعليمية</div><div class="muted">تعليم عالي الجودة</div></div></div>
    <div class="header-center"><input class="search-input" placeholder="ابحث عن دورة..."></div>
    <div class="header-actions"><a class="icon-btn" href="dashboard.html" style="padding:8px 12px;border-radius:8px;background:var(--accent);color:#fff">لوحة التحكم</a></div>
  </header>
  <div class="app">
    <aside class="sidebar">
      <nav>
        <a class="nav-link" href="index.html">🏠 الرئيسية</a>
        <a class="nav-link" href="courses.html">💻 الدورات</a>
      </nav>
    </aside>
    <main class="main">
      <div id="course-area"></div>
    </main>
  </div>
  <script src="shared.js"></script>
  <script>
    function qs(param){ const u = new URL(location.href); return u.searchParams.get(param); }
    document.addEventListener('DOMContentLoaded', ()=>{
      const id = qs('id'); if(!id) return document.getElementById('course-area').innerHTML='Course not found';
      const course = DATA.courses.find(c=>c.id===id); if(!course) return document.getElementById('course-area').innerHTML='Course not found';
      const area = document.getElementById('course-area');
      var title = state.lang==='ar'?course.title_ar:course.title_en;
      var desc = state.lang==='ar'?course.desc_ar:course.desc_en;
      area.innerHTML = "<div class='card' style='display:flex;gap:16px'><div style='flex:1'><img src='" + course.img + "' style='width:100%;height:300px;object-fit:cover'/></div><div style='width:360px;padding:12px'><h2>" + title + "</h2><div class='meta'>" + course.teacher + " • ⭐ " + course.rating + "</div><p style='margin-top:12px'>" + desc + "</p><div style='margin-top:12px'><button id='enroll-btn' class='btn-enroll'>التحق بالدورة</button></div></div></div><div style='margin-top:12px'><h3>الدروس</h3><div id='lessons'></div></div>";
      for(let i=1;i<=8;i++){
        const l = document.createElement('div'); l.className='card'; l.style.marginTop='8px'; l.innerHTML = "<div class='card-body'><div class='title'>" + (state.lang==='ar'?'درس '+i:'Lesson '+i) + "</div><div class='meta'>10 min</div></div>";
        document.getElementById('lessons').appendChild(l);
      }
      document.getElementById('enroll-btn').addEventListener('click', ()=>{
        const enrolled = JSON.parse(localStorage.getItem('enrolled')||'[]'); if(enrolled.includes(id)){ alert('تم الالتحاق'); return; } enrolled.push(id); localStorage.setItem('enrolled', JSON.stringify(enrolled)); alert('تم الالتحاق (تجريبي)');
      });
    });
  </script>
</body>
</html>
