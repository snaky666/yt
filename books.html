<!doctype html>
<html lang="ar" dir="rtl">
<head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title data-i18n="books">الكتب</title><link rel="stylesheet" href="styles.css"></head>
<body>
  <header class="header">
  <div class="brand">
    <div class="logo">ED</div>
    <div>
      <div style="font-weight:800" data-i18n="home">منصة تعليمية</div>
      <div class="muted">تعليم عالي الجودة</div>
    </div>
  </div>
  <div class="header-center">
    <input class="search-input" data-i18n-placeholder="search_placeholder" />
  </div>
  <div class="header-actions">
    <div class="lang-switch">
      <button class="lang-btn" data-lang="ar">العربية</button>
      <button class="lang-btn" data-lang="en">EN</button>
    </div>
    <div style="width:12px"></div>
    <div><a class="icon-btn" href="dashboard.html" style="padding:8px 12px;border-radius:8px;background:var(--accent);color:#fff">لوحة التحكم</a></div>
  </div>
</header>

  <div class="app">
    <aside class="sidebar">
  <nav>
    <a class="nav-link" href="index.html" data-target="index.html">🏠 <span data-i18n="home">الرئيسية</span></a>
    <a class="nav-link" href="courses.html" data-target="courses.html">💻 <span data-i18n="courses">الدورات</span></a>
    <a class="nav-link" href="books.html" data-target="books.html">📚 <span data-i18n="books">الكتب</span></a>
    <a class="nav-link" href="categories.html" data-target="categories.html">🔖 <span data-i18n="categories">التصنيفات</span></a>
    <a class="nav-link" href="dashboard.html" data-target="dashboard.html">📊 <span data-i18n="dashboard">لوحة الطالب</span></a>
    <a class="nav-link" href="about.html" data-target="about.html">ℹ️ <span data-i18n="about">من نحن</span></a>
    <a class="nav-link" href="contact.html" data-target="contact.html">✉️ <span data-i18n="contact">اتصل بنا</span></a>
  </nav>
</aside>

    <main class="main">
      <h1 class="page-title" data-i18n="books">الكتب</h1>
      <section class="section">
        <div id="books-grid" class="grid"></div>
      </section>
    </main>
  </div>
  <script src="shared.js"></script>
  <script>
    // render books
    document.addEventListener('DOMContentLoaded', ()=>{
      const wrap = document.getElementById('books-grid');
      DATA.books.forEach(b=>{
        const card = document.createElement('div'); card.className='card';
        card.innerHTML = "<div class='card-body'><div class='title'>" + (state.lang==='ar'?b.title_ar:b.title_en) + "</div><div class='meta'>المؤلف: " + b.author + "</div><div style='margin-top:auto'><a href='" + b.source + "' target='_blank' class='lang-btn'>" + (state.lang==='ar'?'المصدر':'Source') + "</a></div></div>";
        wrap.appendChild(card);
      });
    });
  </script>
</body>
</html>
