<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>منصة تعليمية — Udemy-like (بني/بيج)</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="header">
    <div class="brand"><div class="logo">ED</div><div><div style="font-weight:800">منصة تعليمية</div><div class="muted">تعليم عالي الجودة</div></div></div>
    <div class="search-bar"><input id="search-input" class="search-input" placeholder="ابحث عن دورة، تقنية أو مدرس..." /><button class="icon-btn">🔍</button></div>
    <div class="header-actions">
      <button class="icon-btn">🔔</button>
      <button class="icon-btn">🛒</button>
      <div style="width:140px" class="sidebar"><div style="font-weight:700">المسجلين</div><div class="muted" id="total-users">0 مستخدم</div><div style="margin-top:10px"><div class="muted">دوراتك</div><div id="enrolled-list"></div></div></div>
    </div>
  </header>

  <main class="container">
    <section class="hero">
      <div class="hero-left">
        <h1 class="hero-title">تعلم مهارة جديدة الآن</h1>
        <p class="hero-sub">مئات الدورات الحصرية، تعليم عملي، شهادات قابلة للمشاركة.</p>
      </div>
    </section>

    <section class="grid">
      <div>
        <div style="display:flex;justify-content:space-between;align-items:center">
          <h2>الدورات الموصى بها</h2>
          <div class="muted">إجمالي: <span id="total-courses">0</span></div>
        </div>
        <div id="courses-grid" class="grid"></div>
      </div>

      <aside class="sidebar">
        <div style="font-weight:700;margin-bottom:8px">التصنيفات</div>
        <div class="muted">تطوير – تصميم – بيانات – أعمال</div>
        <hr style="margin:12px 0;border:none;background:rgba(0,0,0,0.04);height:1px"/>
        <div style="font-weight:700;margin-bottom:8px">دوراتك الملتحق بها</div>
        <div id="enrolled-list-aside"></div>
      </aside>
    </section>

    <div id="modal" class="modal"></div>

    <footer style="text-align:center;padding:20px;margin-top:22px" class="muted">حقوق © 2025 — نموذج تجريبي مستوحى من Udemy</footer>
  </main>

  <script src="app.js"></script>
</body>
</html>
