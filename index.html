<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>منصة تعليمية — ملىء بالمحتوى</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="site-header">
    <div class="brand"><div class="logo">ED</div><div><h1 id="site-title">منصة تعليمية</h1><div class="muted">منصة تعليمية نموذجيّة</div></div></div>
    <div class="actions"><div class="lang-select"><button class="chip" data-lang="ar">العربية</button><button class="chip" data-lang="en">EN</button><button class="chip" data-lang="fr">FR</button></div><button id="open-login" class="btn">دخول</button></div>
  </header>
  <main class="container">
    <section class="hero">
      <div><input id="search" placeholder="ابحث عن دورة أو كتاب..." class="search-input"/></div>
      <div class="stats"><span id="total-courses">0 دورات</span> • <span id="total-books">0 كتب</span></div>
    </section>
    <section class="library cards" id="books-list"><h2>الكتب</h2></section>
    <section class="courses cards" id="courses-list"><h2>الدورات</h2></section>
    <section id="course-detail" class="modal"></section>
  </main>
  <footer class="site-footer">حقوق © 2025 — نموذج تجريبي</footer>
  <script src="data.json"></script>
  <script src="app.js"></script>
</body>
</html>
