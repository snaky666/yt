<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>NovaAcademy — منصة تعليمية متكاملة</title>
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
  <aside id="sidebar" class="sidebar">
    <div class="brand">
      <div class="logo">Nova<span>Academy</span></div>
      <button id="sidebar-close" class="icon-btn">×</button>
    </div>
    <nav class="side-nav">
      <a href="#home" class="nav-link active">الرئيسية</a>
      <a href="#courses" class="nav-link">الدورات</a>
      <a href="#library" class="nav-link">المكتبة</a>
      <a href="#live" class="nav-link">البث المباشر</a>
      <a href="#community" class="nav-link">المجتمع</a>
      <a href="#profile" class="nav-link">حسابي</a>
      <a href="#contact" class="nav-link">تواصل معنا</a>
    </nav>
  </aside>

  <header class="topbar">
    <button id="sidebar-open" class="icon-btn">☰</button>
    <div class="search-wrap">
      <input id="global-search" type="search" placeholder="ابحث ..." />
      <button id="search-btn" class="icon-btn">🔍</button>
    </div>
  </header>

  <main id="main">
    <section id="home" class="hero">
      <div class="hero-inner">
        <h1>NovaAcademy</h1>
        <p class="lead">منصة عالمية — مكتبة ضخمة، دورات تفاعلية، تتبع تقدم، مجتمع.</p>
        <div class="hero-ctas">
          <a href="#courses" class="btn primary">ابدأ</a>
          <a href="#library" class="btn ghost">المكتبة</a>
        </div>
      </div>
    </section>
  </main>

  <footer class="footer">
    <p>NovaAcademy © 2025</p>
  </footer>
  <script src="assets/js/script.js"></script>
</body>
</html>
